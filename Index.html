<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WebOS 12</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ═══════════════════════════════════════════════════════
   CSS CUSTOM PROPERTIES — THEMING
═══════════════════════════════════════════════════════ */
:root {
  --accent:       #0078d4;
  --accent-hover: #1084d8;
  --accent-light: #60cdff;
  --radius:       10px;
  --radius-lg:    14px;
  --font:         'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --transition:   0.14s cubic-bezier(0.2, 0.8, 0.2, 1);
  --shadow:       0 8px 28px rgba(0,0,0,.28);
  --shadow-lg:    0 32px 80px rgba(0,0,0,.5);
  --taskbar-h:       48px;
  --taskbar-inset:   10px;
  --workspace-bottom: calc(var(--taskbar-h) + var(--taskbar-inset) + 8px);
}

/* Dark theme (Windows 11 default) */
[data-theme="dark"] {
  --bg:             #202020;
  --surface:        rgba(32,32,32,.88);
  --surface-2:      rgba(44,44,44,.92);
  --surface-hover:  rgba(255,255,255,.07);
  --surface-active: rgba(255,255,255,.11);
  --border:         rgba(255,255,255,.09);
  --text:           #f5f5f5;
  --text-sec:       rgba(255,255,255,.60);
  --text-ter:       rgba(255,255,255,.38);
  --taskbar:        rgba(28,28,28,.88);
  --title-bar:      rgba(36,36,36,.96);
  --start-bg:       rgba(30,30,30,.92);
  --input-bg:       rgba(255,255,255,.06);
}

/* Light theme */
[data-theme="light"] {
  --bg:             #f3f3f3;
  --surface:        rgba(240,240,240,.88);
  --surface-2:      rgba(255,255,255,.94);
  --surface-hover:  rgba(0,0,0,.05);
  --surface-active: rgba(0,0,0,.09);
  --border:         rgba(0,0,0,.09);
  --text:           #202020;
  --text-sec:       rgba(0,0,0,.55);
  --text-ter:       rgba(0,0,0,.35);
  --taskbar:        rgba(235,235,235,.88);
  --title-bar:      rgba(228,228,228,.96);
  --start-bg:       rgba(243,243,243,.94);
  --input-bg:       rgba(0,0,0,.05);
}

/* ═══ Reset & Base ═══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  user-select: none;
  -webkit-font-smoothing: antialiased;
}
button { font-family: var(--font); cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: var(--font); }

::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(128,128,128,.35); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(128,128,128,.55); }

/* ═══════════════════════════════════════════════════════
   DESKTOP
═══════════════════════════════════════════════════════ */
#desktop {
  position: fixed;
  inset: 0;
  bottom: var(--workspace-bottom);
  background: var(--wallpaper, linear-gradient(135deg,#0f3460 0%,#1a1a4e 45%,#16213e 100%));
  background-size: cover;
  background-position: center;
  overflow: hidden;
}

/* Animated atmosphere (sits above wallpaper, below icons) */
#desktop-atmosphere {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
  mix-blend-mode: soft-light;
  opacity: 0.85;
}
#desktop-atmosphere::before,
#desktop-atmosphere::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  filter: blur(72px);
  animation: floatOrb 22s ease-in-out infinite;
}
#desktop-atmosphere::before {
  width: 50vmax;
  height: 50vmax;
  left: -12%;
  top: -18%;
  background: radial-gradient(circle, var(--accent) 0%, transparent 72%);
  opacity: 0.4;
}
#desktop-atmosphere::after {
  width: 42vmax;
  height: 42vmax;
  right: -18%;
  bottom: -12%;
  background: radial-gradient(circle, var(--accent-light) 0%, transparent 68%);
  opacity: 0.28;
  animation-delay: -11s;
}
@keyframes floatOrb {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(4%, 5%) scale(1.06); }
}
[data-theme="light"] #desktop-atmosphere {
  mix-blend-mode: multiply;
  opacity: 0.5;
}

/* ── Desktop icons (absolute grid, draggable) ── */
#desktop-icons {
  position: absolute;
  inset: 12px;
  z-index: 1;
  pointer-events: none;
}
.desktop-icon {
  position: absolute;
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 7px 8px; border-radius: 6px;
  cursor: default; width: 80px; text-align: center;
  transition: background var(--transition), box-shadow var(--transition);
  pointer-events: auto;
  user-select: none;
}
.desktop-icon:hover   { background: rgba(255,255,255,.14); }
.desktop-icon.selected{ background: rgba(0,120,212,.35); outline:1px solid rgba(96,205,255,.35); }
.desktop-icon.di-dragging { opacity: 0.92; z-index: 5; cursor: grabbing; box-shadow: 0 8px 24px rgba(0,0,0,.35); }
.desktop-icon .di-icon {
  font-size: 34px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  min-height: 36px;
}
.desktop-icon .di-icon svg, .lucide-inline svg { stroke: currentColor; fill: none; }
.lucide-inline { display: inline-flex; vertical-align: middle; align-items: center; justify-content: center; }
.tb-btn .lucide-inline svg { width: 20px; height: 20px; }
.win-icon { display: inline-flex; align-items: center; justify-content: center; }
.win-icon svg { width: 15px; height: 15px; }
.s-app-btn .si { display: flex; align-items: center; justify-content: center; }
.s-app-btn .si svg { width: 28px; height: 28px; }
#start-btn, .tray-btn { display: inline-flex; align-items: center; justify-content: center; }
#start-btn svg, .tray-btn svg { width: 20px; height: 20px; }
#notif-btn svg { width: 18px; height: 18px; }
.qs-tile-icon { display: flex; align-items: center; justify-content: center; }
.qs-tile-icon svg { width: 22px; height: 22px; }
.pow-btn { font-size: 0; }
.pow-btn svg { width: 18px; height: 18px; }
.fi svg, .fli svg { width: 36px; height: 36px; }
.fl-item .fli svg { width: 22px; height: 22px; }
.nc-item {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  padding: 14px 16px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  margin-bottom: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,.2);
  animation: ncItemIn 0.2s ease;
}
.nc-item .nc-card-title { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; }
.nc-item .nc-card-title svg { width: 18px; height: 18px; flex-shrink: 0; }
.nc-item .nc-card-body { font-size: 12px; color: var(--text-sec); margin-top: 6px; line-height: 1.45; }
#nc-list { flex: 1; overflow-y: auto; padding-right: 4px; }
.app-recycle { display: flex; flex-direction: column; height: 100%; }
.rb-toolbar { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.rb-list { flex: 1; overflow-y: auto; padding: 8px; }
.rb-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 8px; background: var(--surface-2); }
.rb-row .rb-name { flex: 1; font-size: 13px; }
.rb-row .rb-date { font-size: 11px; color: var(--text-ter); }
.rb-empty { text-align: center; padding: 48px 16px; color: var(--text-ter); font-size: 14px; }
.rb-btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; border: 1px solid var(--border); background: var(--surface-hover); cursor: pointer; color: var(--text); }
.rb-btn.danger { color: #f47174; }
.rb-btn:hover { background: var(--surface-active); }
.desktop-icon .di-label {
  font-size: 11.5px; color:#fff;
  text-shadow: 0 1px 4px rgba(0,0,0,.9);
  line-height: 1.3; word-break: break-word;
}

/* ═══════════════════════════════════════════════════════
   CONTEXT MENU
═══════════════════════════════════════════════════════ */
#context-menu {
  position: fixed;
  background: var(--surface);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 4px; min-width: 220px;
  display: none; z-index: 9999;
  animation: menuPop .1s ease;
}
#context-menu.visible { display: block; }
.ctx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 6px;
  font-size: 13px; cursor: pointer; color: var(--text);
  transition: background var(--transition);
}
.ctx-item:hover { background: var(--surface-hover); }
.ctx-item:active { background: var(--surface-active); }
.ctx-icon { width: 20px; text-align: center; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ctx-icon svg { width: 16px; height: 16px; stroke: currentColor; }
.ctx-separator { height: 1px; background: var(--border); margin: 4px 8px; }
.ctx-item.danger:hover { background: rgba(196,43,28,.15); color:#f47174; }

/* ═══════════════════════════════════════════════════════
   TASKBAR
═══════════════════════════════════════════════════════ */
#taskbar {
  position: fixed;
  bottom: var(--taskbar-inset);
  left: var(--taskbar-inset);
  right: var(--taskbar-inset);
  height: var(--taskbar-h);
  background: var(--taskbar);
  backdrop-filter: blur(40px) saturate(200%);
  -webkit-backdrop-filter: blur(40px) saturate(200%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  display: flex; align-items: center; justify-content: center;
  z-index: 8000;
}
#taskbar-center {
  display: flex; align-items: center; gap: 2px; height:100%;
  max-width: 80vw; overflow: hidden;
}
#taskbar-right {
  position: absolute; right:0;
  display: flex; align-items: center; height:100%; padding-right:4px;
}

/* Taskbar buttons (pinned + open apps) */
.tb-btn {
  position: relative; width:44px; height:40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; cursor: pointer; font-size: 20px; flex-shrink:0;
  transition: background var(--transition);
  -webkit-app-region: no-drag;
}
.tb-btn:hover  { background: var(--surface-hover); }
.tb-btn:active { background: var(--surface-active); }
/* Active indicator dot */
.tb-btn::after {
  content:''; position: absolute; bottom: 3px; left:50%;
  transform: translateX(-50%);
  width:4px; height:4px; border-radius:50%;
  background: transparent;
  transition: background var(--transition), width var(--transition);
}
.tb-btn.app-open::after   { background: var(--text-sec); }
.tb-btn.app-focused::after{ background: var(--accent-light); width:14px; }

/* Taskbar tooltip */
.tb-btn[data-tooltip]:hover::before {
  content: attr(data-tooltip);
  position: absolute; bottom: calc(100% + 8px); left:50%;
  transform: translateX(-50%);
  background: var(--surface-2); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius:6px;
  padding: 4px 10px; font-size:12px; color: var(--text);
  white-space: nowrap; box-shadow: var(--shadow);
  pointer-events: none; z-index: 9999;
}

#start-btn {
  font-size: 22px; width:44px; height:40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; cursor: pointer; flex-shrink:0;
  transition: background var(--transition);
  margin-right:4px;
}
#start-btn:hover  { background: var(--surface-hover); }
#start-btn.active { background: var(--surface-active); }

#search-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px; height:34px;
  background: var(--input-bg);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; color: var(--text-sec);
  cursor: text; margin-right:6px; min-width: 180px; flex-shrink:0;
  transition: background var(--transition), border-color var(--transition);
}
#search-btn:hover { background: var(--surface-hover); border-color: var(--accent); }

.tb-divider { width:1px; height:24px; background: var(--border); margin:0 4px; flex-shrink:0; }

/* System tray */
.tray-btn {
  display: flex; align-items: center; justify-content: center;
  padding: 0 8px; height:40px; border-radius:6px;
  cursor: pointer; font-size: 15px;
  transition: background var(--transition); color: var(--text);
}
.tray-btn:hover { background: var(--surface-hover); }

#clock-btn {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 0 10px; height:40px;
  border-radius: 6px; cursor: pointer;
  transition: background var(--transition);
}
#clock-btn:hover { background: var(--surface-hover); }
#clock-time { font-size:12px; font-weight:500; color:var(--text); }
#clock-date { font-size:11px; color:var(--text-sec); }

/* ═══════════════════════════════════════════════════════
   START MENU
═══════════════════════════════════════════════════════ */
#start-menu {
  position: fixed; bottom: calc(var(--workspace-bottom) + 8px); left:50%;
  transform: translateX(-50%) scale(.97) translateY(10px);
  width: 640px; max-height: 680px;
  background: var(--start-bg);
  backdrop-filter: blur(60px) saturate(200%);
  -webkit-backdrop-filter: blur(60px) saturate(200%);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); z-index: 8500;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
  overflow: hidden;
}
#start-menu.open {
  opacity: 1; pointer-events: all;
  transform: translateX(-50%) scale(1) translateY(0);
}

#start-search-wrap { padding: 20px 24px 8px; }
#start-search-wrap input {
  width:100%; padding: 10px 16px;
  background: var(--input-bg);
  border: 1px solid var(--border); border-radius:6px;
  color: var(--text); font-size:14px; outline:none;
  transition: border-color var(--transition);
}
#start-search-wrap input:focus { border-color: var(--accent); }
#start-search-wrap input::placeholder { color: var(--text-ter); }

#start-body { flex:1; overflow-y:auto; padding: 0 24px; }
.start-section { margin-bottom: 16px; }
.start-section-title {
  font-size:12px; color:var(--text-sec); font-weight:600;
  letter-spacing:.6px; text-transform:uppercase;
  margin: 4px 0 10px; display:flex; justify-content:space-between; align-items:center;
}
.start-section-title a { font-size:12px; color:var(--accent); cursor:pointer; text-transform:none; font-weight:400; letter-spacing:0; }
#start-apps-grid {
  display: grid; grid-template-columns: repeat(6,1fr); gap:3px;
}
.s-app-btn {
  display: flex; flex-direction: column; align-items: center;
  gap: 5px; padding: 11px 6px 9px; border-radius: var(--radius);
  cursor: pointer; transition: background var(--transition); text-align:center;
}
.s-app-btn:hover  { background: var(--surface-hover); }
.s-app-btn:active { background: var(--surface-active); }
.s-app-btn .si  { font-size:28px; }
.s-app-btn .sn  { font-size:11px; color:var(--text-sec); line-height:1.2; }

#start-footer {
  padding: 10px 24px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border); flex-shrink:0;
}
.start-user {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: var(--radius);
  cursor: pointer; transition: background var(--transition);
}
.start-user:hover { background: var(--surface-hover); }
.user-avatar {
  width:32px; height:32px; border-radius:50%;
  background: linear-gradient(135deg,#0078d4,#60cdff);
  display:flex; align-items:center; justify-content:center;
  font-size:15px; color:#fff; font-weight:700; flex-shrink:0;
}
.user-name { font-size:13px; font-weight:500; }
.power-row { display:flex; gap:4px; }
.pow-btn {
  width:36px; height:36px; border-radius:var(--radius);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; cursor:pointer;
  transition: background var(--transition); color:var(--text);
}
.pow-btn:hover { background: var(--surface-hover); }
.pow-btn.shutdown:hover { background:rgba(196,43,28,.15); color:#f47174; }

/* Search results */
#start-search-results { display:none; padding: 0 24px 12px; }
.sr-item {
  display:flex; align-items:flex-start; gap:12px;
  padding:10px 12px; border-radius:var(--radius);
  cursor:pointer; transition: background var(--transition);
}
.sr-item:hover { background: var(--surface-hover); }
.sr-item .sri { font-size:26px; }
.sr-item .srn { font-size:14px; }
.sr-item .sr-sub { font-size:11px; color:var(--text-ter); margin-top:2px; }
.sr-item .sr-meta { display:flex; flex-direction:column; align-items:flex-start; }

/* ═══════════════════════════════════════════════════════
   WINDOW SYSTEM
═══════════════════════════════════════════════════════ */
#windows-layer {
  position: fixed; inset:0; bottom: var(--workspace-bottom);
  pointer-events: none; z-index:1000;
}

.window {
  position: absolute;
  background: var(--surface);
  backdrop-filter: blur(40px) saturate(200%);
  -webkit-backdrop-filter: blur(40px) saturate(200%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: 0 12px 40px rgba(0,0,0,.32), 0 0 0 1px rgba(255,255,255,.04) inset;
  display: flex; flex-direction: column; overflow: hidden;
  pointer-events: all; min-width:280px; min-height:180px;
  transition: box-shadow .22s cubic-bezier(0.2,0.8,0.2,1), opacity .15s, border-radius .15s;
  will-change: transform;
}
.window.focused {
  box-shadow: 0 40px 90px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.14), 0 0 48px rgba(96,205,255,.12);
}
.window.minimized { display:none; }
.window.maximized { top:0 !important; left:0 !important; width:100% !important; height:100% !important; border-radius:0; }
.window.snapped-left  { top:0 !important; left:0 !important; width:50% !important; height:100% !important; border-radius:0; }
.window.snapped-right { top:0 !important; left:50% !important; width:50% !important; height:100% !important; border-radius:0; }

/* Title bar */
.win-titlebar {
  display:flex; align-items:center; height:36px;
  padding: 0 0 0 12px; background: var(--title-bar);
  flex-shrink:0; cursor:default;
}
.win-icon  { font-size:15px; margin-right:8px; flex-shrink:0; }
.win-title { font-size:13px; font-weight:400; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); }
.win-ctrls { display:flex; align-items:center; height:100%; flex-shrink:0; margin-left:auto; }
.wc-btn {
  width:46px; height:36px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:background var(--transition); color:var(--text);
}
.wc-btn:hover { background: var(--surface-hover); }
.wc-btn.wc-close:hover { background:#c42b1c; color:#fff; }
.wc-btn svg { width:10px; height:10px; fill:currentColor; }

/* Window content */
.win-content { flex:1; overflow:hidden; position:relative; }

/* Resize handles — 8 directional */
.rh { position:absolute; z-index:20; }
.rh-n  { top:-3px;    left:8px;    right:8px;   height:6px;  cursor:n-resize; }
.rh-s  { bottom:-3px; left:8px;    right:8px;   height:6px;  cursor:s-resize; }
.rh-e  { right:-3px;  top:8px;     bottom:8px;  width:6px;   cursor:e-resize; }
.rh-w  { left:-3px;   top:8px;     bottom:8px;  width:6px;   cursor:w-resize; }
.rh-ne { top:-3px;    right:-3px;  width:12px;  height:12px; cursor:ne-resize; }
.rh-nw { top:-3px;    left:-3px;   width:12px;  height:12px; cursor:nw-resize; }
.rh-se { bottom:-3px; right:-3px;  width:12px;  height:12px; cursor:se-resize; }
.rh-sw { bottom:-3px; left:-3px;   width:12px;  height:12px; cursor:sw-resize; }

/* Snap overlay */
#snap-overlay {
  position:fixed; background:rgba(0,120,212,.15);
  border:2px solid rgba(0,120,212,.5); border-radius:var(--radius);
  display:none; z-index:999; pointer-events:none;
  transition: all .1s ease;
}

/* ═══════════════════════════════════════════════════════
   APP — NOTEPAD
═══════════════════════════════════════════════════════ */
.app-notepad { display:flex; flex-direction:column; height:100%; }
.app-menubar {
  display:flex; align-items:center; gap:0;
  padding: 2px 6px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.menu-item {
  padding: 4px 10px; border-radius:4px; font-size:13px;
  cursor:pointer; color:var(--text); position:relative;
  transition: background var(--transition);
}
.menu-item:hover  { background: var(--surface-hover); }
.menu-item.open   { background: var(--surface-active); }
.dropdown-menu {
  position:absolute; top:100%; left:0;
  background: var(--surface); backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid var(--border); border-radius:var(--radius-lg);
  box-shadow: var(--shadow-lg); min-width:180px;
  padding:4px; z-index:9000; display:none;
}
.dropdown-menu.open { display:block; animation: menuPop .1s ease; }
.dd-item {
  display:flex; align-items:center; justify-content:space-between;
  padding: 8px 12px; border-radius:6px; font-size:13px;
  cursor:pointer; color:var(--text); transition: background var(--transition);
}
.dd-item:hover { background: var(--surface-hover); }
.dd-kbd { color:var(--text-ter); font-size:11px; }
.dd-sep { height:1px; background:var(--border); margin:4px 8px; }

.notepad-area {
  flex:1; padding:14px 16px; background:transparent;
  border:none; outline:none; color:var(--text);
  font-size:14px; line-height:1.65; resize:none;
  font-family:'Cascadia Code','Consolas',monospace; user-select:text;
}
.notepad-status {
  padding:3px 12px; border-top:1px solid var(--border);
  font-size:11px; color:var(--text-sec); display:flex; gap:16px; flex-shrink:0;
}

/* ═══════════════════════════════════════════════════════
   APP — FILE EXPLORER
═══════════════════════════════════════════════════════ */
.app-explorer { display:flex; flex-direction:column; height:100%; }
.explorer-toolbar {
  display:flex; align-items:center; gap:4px;
  padding: 7px 12px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.ex-nav-btn {
  width:30px; height:30px; border-radius:5px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; cursor:pointer; color:var(--text);
  transition: background var(--transition);
}
.ex-nav-btn:hover:not(:disabled) { background: var(--surface-hover); }
.ex-nav-btn:disabled { opacity:.3; cursor:default; }
.explorer-addr {
  flex:1; padding: 6px 12px;
  background: var(--input-bg); border:1px solid var(--border);
  border-radius:6px; color:var(--text); font-size:13px; outline:none;
  transition: border-color var(--transition);
}
.explorer-addr:focus { border-color: var(--accent); }

.explorer-body { display:flex; flex:1; overflow:hidden; }
.explorer-sidebar {
  width:190px; border-right:1px solid var(--border);
  padding: 8px 4px; overflow-y:auto; flex-shrink:0;
}
.sidebar-section { padding: 4px 8px; font-size:11px; color:var(--text-ter); font-weight:600; letter-spacing:.5px; text-transform:uppercase; margin-top:8px; }
.sb-item {
  display:flex; align-items:center; gap:8px;
  padding: 7px 10px; border-radius:6px; font-size:13px;
  cursor:pointer; color:var(--text); transition: background var(--transition);
}
.sb-item:hover  { background: var(--surface-hover); }
.sb-item.active { background: var(--surface-active); }
.sb-item .sbi   { display:inline-flex; align-items:center; justify-content:center; }
.sb-item .sbi .lucide-inline svg { width:16px; height:16px; }
.ex-nav-btn .lucide-inline svg, .evb .lucide-inline svg { width:18px; height:18px; }
.br-nav .lucide-inline svg { width:16px; height:16px; }
.pt-btn .lucide-inline svg { width:16px; height:16px; }
.cb .lucide-inline { display:flex; align-items:center; justify-content:center; margin:auto; }
.cb .lucide-inline svg { width:18px; height:18px; }

.explorer-main { flex:1; padding:12px; overflow-y:auto; }
.explorer-main-toolbar {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
}
.ex-breadcrumb { font-size:13px; color:var(--text-sec); }
.ex-view-btns  { display:flex; gap:2px; }
.evb {
  width:28px; height:28px; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; cursor:pointer; color:var(--text);
  transition: background var(--transition);
}
.evb:hover  { background: var(--surface-hover); }
.evb.active { background: var(--surface-active); }

.file-grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(88px,1fr)); gap:4px; }
.file-item {
  display:flex; flex-direction:column; align-items:center;
  gap:4px; padding:10px 6px; border-radius:6px;
  cursor:pointer; text-align:center;
  transition: background var(--transition);
}
.file-item:hover    { background: var(--surface-hover); }
.file-item.selected { background: rgba(0,120,212,.2); outline:1px solid rgba(0,120,212,.4); }
.file-item .fi  { font-size:36px; }
.file-item .fn  { font-size:11.5px; line-height:1.2; word-break:break-word; }

.file-list-view { display:flex; flex-direction:column; gap:1px; }
.fl-item {
  display:flex; align-items:center; gap:10px;
  padding: 7px 10px; border-radius:6px; cursor:pointer;
  transition: background var(--transition); font-size:13px;
}
.fl-item:hover    { background: var(--surface-hover); }
.fl-item.selected { background: rgba(0,120,212,.2); }
.fl-item .fli  { font-size:20px; }
.fl-item .fln  { flex:1; }
.fl-item .fld  { font-size:12px; color:var(--text-sec); }

.explorer-status {
  padding:4px 12px; border-top:1px solid var(--border);
  font-size:12px; color:var(--text-sec); flex-shrink:0;
}

/* ═══════════════════════════════════════════════════════
   APP — SETTINGS
═══════════════════════════════════════════════════════ */
.app-settings { display:flex; height:100%; }
.settings-sidebar {
  width:220px; border-right:1px solid var(--border);
  padding: 8px 4px; overflow-y:auto; flex-shrink:0;
}
.settings-sidebar-header { padding:14px 14px 6px; font-size:18px; font-weight:600; }
.settings-nav {
  display:flex; align-items:center; gap:10px;
  padding: 9px 12px; border-radius:var(--radius);
  font-size:13px; cursor:pointer; color:var(--text);
  transition: background var(--transition);
}
.settings-nav:hover  { background: var(--surface-hover); }
.settings-nav.active { background: var(--surface-active); }
.settings-nav .sni   { font-size:17px; display:inline-flex; align-items:center; vertical-align:middle; }
.settings-nav .sni svg { width:17px; height:17px; stroke: currentColor; }
.sr-icon { display:flex; align-items:center; justify-content:center; }
.sr-icon svg { stroke: var(--accent-light); }
.settings-main { flex:1; overflow-y:auto; padding:24px 28px; }
.settings-page { display:none; }
.settings-page.active { display:block; }
.settings-page-title { font-size:20px; font-weight:600; margin-bottom:20px; }

.settings-card {
  background: var(--surface-2); border:1px solid var(--border);
  border-radius:var(--radius); margin-bottom:12px; overflow:hidden;
}
.settings-row {
  display:flex; align-items:center; padding:14px 16px;
  border-bottom:1px solid var(--border); gap:14px;
}
.settings-row:last-child { border-bottom:none; }
.sr-icon { font-size:18px; flex-shrink:0; }
.sr-info { flex:1; }
.sr-title { font-size:13.5px; }
.sr-desc  { font-size:12px; color:var(--text-sec); margin-top:1px; }
.sr-ctrl  { flex-shrink:0; }

/* Toggle switch */
.sw { position:relative; width:44px; height:24px; cursor:pointer; display:inline-block; }
.sw input { opacity:0; width:0; height:0; position:absolute; }
.sw-track {
  position:absolute; inset:0; background:rgba(128,128,128,.4);
  border-radius:12px; transition: background .2s;
}
.sw-thumb {
  position:absolute; top:3px; left:3px; width:18px; height:18px;
  background:#fff; border-radius:50%;
  box-shadow:0 1px 4px rgba(0,0,0,.3);
  transition: transform .2s;
}
.sw input:checked ~ .sw-track { background: var(--accent); }
.sw input:checked ~ .sw-thumb { transform: translateX(20px); }

/* Wallpaper grid */
.wp-grid {
  display:grid; grid-template-columns: repeat(4,1fr); gap:10px; padding:14px;
}
.wp-item {
  aspect-ratio:16/9; border-radius:8px; cursor:pointer;
  border:3px solid transparent; background-size:cover; background-position:center;
  transition: border-color .15s, transform .15s; overflow:hidden;
}
.wp-item:hover  { transform:scale(1.04); }
.wp-item.active { border-color: var(--accent); }
.wp-item span   { display:block; width:100%; height:100%; }

/* Accent swatches */
.accent-grid { display:flex; gap:8px; padding:12px 14px; flex-wrap:wrap; }
.accent-sw {
  width:30px; height:30px; border-radius:50%; cursor:pointer;
  border:3px solid transparent; transition: transform .15s, border-color .15s;
}
.accent-sw:hover  { transform:scale(1.12); }
.accent-sw.active { border-color: var(--text); }

/* ═══════════════════════════════════════════════════════
   APP — TERMINAL
═══════════════════════════════════════════════════════ */
.app-terminal {
  display:flex; flex-direction:column; height:100%;
  background:#0c0c0c; color:#ccc;
  font-family:'Cascadia Code','Consolas','Courier New',monospace; font-size:13px;
}
.terminal-title-bar {
  padding:6px 14px; background:#1a1a1a; border-bottom:1px solid #333;
  display:flex; align-items:center; gap:8px; font-size:12px; color:#888; flex-shrink:0;
}
.terminal-output {
  flex:1; overflow-y:auto; padding:10px 14px; line-height:1.55;
}
.tl  { white-space:pre-wrap; word-break:break-all; }
.tl.prompt  { color:#4fc1ff; }
.tl.out     { color:#ccc; }
.tl.err     { color:#f47174; }
.tl.ok      { color:#73c991; }
.tl.info    { color:#dcdcaa; }
.tl.warn    { color:#ffa500; }
.terminal-input-row {
  display:flex; align-items:center; padding:8px 14px;
  border-top:1px solid #333; gap:6px; flex-shrink:0;
}
.t-prompt-label { color:#4fc1ff; white-space:nowrap; }
.t-input {
  flex:1; background:transparent; border:none; outline:none;
  color:#ccc; font-family:inherit; font-size:13px; caret-color:#ccc; user-select:text;
}

/* ═══════════════════════════════════════════════════════
   APP — CALCULATOR
═══════════════════════════════════════════════════════ */
.app-calc {
  display:flex; flex-direction:column;
  height:100%; padding:14px; gap:8px; background:var(--surface);
}
.calc-display {
  background: var(--input-bg); border-radius:var(--radius);
  padding:16px 18px; text-align:right; flex-shrink:0;
}
.calc-expr   { font-size:14px; color:var(--text-sec); min-height:20px; word-break:break-all; }
.calc-result { font-size:44px; font-weight:200; color:var(--text); line-height:1.1; word-break:break-all; }
.calc-grid   { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; flex:1; }
.cb {
  border-radius:var(--radius); font-size:16px; font-weight:400;
  cursor:pointer; background:var(--surface-2); color:var(--text);
  border:none; padding:0; transition: filter .12s, transform .08s;
  min-height:48px;
}
.cb:hover  { filter:brightness(1.1); }
.cb:active { transform:scale(.93); }
.cb.op { background:rgba(0,120,212,.14); color:var(--accent-light); }
.cb.eq { background:var(--accent); color:#fff; }
.cb.fn { background:var(--surface-hover); font-size:14px; }
.cb.wide { grid-column:span 2; }

/* ═══════════════════════════════════════════════════════
   APP — BROWSER
═══════════════════════════════════════════════════════ */
.app-browser { display:flex; flex-direction:column; height:100%; }
.browser-bar {
  display:flex; align-items:center; gap:5px;
  padding:7px 10px; border-bottom:1px solid var(--border);
  background: var(--title-bar); flex-shrink:0;
}
.br-nav {
  width:28px; height:28px; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; cursor:pointer; color:var(--text);
  transition:background var(--transition);
}
.br-nav:hover { background:var(--surface-hover); }
.br-url {
  flex:1; padding:6px 12px; background:var(--input-bg);
  border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-size:13px; outline:none; user-select:text;
  transition:border-color var(--transition);
}
.br-url:focus { border-color:var(--accent); }
.browser-frame { flex:1; border:none; background:#fff; }

/* ═══════════════════════════════════════════════════════
   APP — PAINT
═══════════════════════════════════════════════════════ */
.app-paint { display:flex; flex-direction:column; height:100%; }
.paint-toolbar {
  display:flex; align-items:center; gap:4px;
  padding:6px 12px; border-bottom:1px solid var(--border); flex-wrap:wrap; flex-shrink:0;
}
.pt-btn {
  width:30px; height:30px; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; cursor:pointer; color:var(--text);
  transition:background var(--transition);
}
.pt-btn:hover  { background:var(--surface-hover); }
.pt-btn.active { background:rgba(0,120,212,.2); outline:1px solid rgba(0,120,212,.5); }
.pt-sep  { width:1px; height:24px; background:var(--border); margin:0 4px; }
.pt-sw   { width:26px; height:26px; border-radius:3px; cursor:pointer; border:2px solid transparent; }
.pt-sw.active { border-color:var(--text); }
.pt-size {
  width:46px; padding:4px 6px; background:var(--input-bg);
  border:1px solid var(--border); border-radius:4px;
  color:var(--text); font-size:12px; outline:none; text-align:center;
}
.paint-canvas-wrap {
  flex:1; overflow:auto; background:#808080;
  display:flex; align-items:flex-start; justify-content:flex-start; padding:18px;
}
#paint-canvas { background:#fff; cursor:crosshair; box-shadow:0 2px 12px rgba(0,0,0,.4); display:block; }

/* ═══════════════════════════════════════════════════════
   NOTIFICATIONS
═══════════════════════════════════════════════════════ */
#notif-container {
  position:fixed; top:10px; right:10px; z-index:30000;
  display:flex; flex-direction:column; gap:8px; pointer-events:none;
}
.notif {
  background: var(--surface); backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid var(--border); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg); padding:14px 16px;
  min-width:300px; max-width:340px;
  pointer-events:all; display:flex; gap:12px; align-items:flex-start;
  animation: slideIn .25s ease; cursor:pointer;
}
.notif:hover { filter:brightness(1.05); }
.notif-icon { flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; }
.notif-icon svg { width:22px; height:22px; stroke: var(--accent-light); }
.notif-body { flex:1; }
.notif-title { font-size:13px; font-weight:600; }
.notif-msg   { font-size:12px; color:var(--text-sec); margin-top:2px; }

/* ═══════════════════════════════════════════════════════
   ALT+TAB OVERLAY
═══════════════════════════════════════════════════════ */
#alttab-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.55);
  display:none; align-items:center; justify-content:center;
  z-index:9800; backdrop-filter:blur(12px);
}
#alttab-overlay.visible { display:flex; }
#alttab-box {
  background:var(--surface); backdrop-filter:blur(30px);
  border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:16px; display:flex; gap:8px; max-width:90vw; flex-wrap:wrap; justify-content:center;
}
.at-item {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  padding:12px 14px; border-radius:var(--radius); cursor:pointer;
  transition:background var(--transition); min-width:96px;
}
.at-item:hover  { background:var(--surface-hover); }
.at-item.at-sel { background:rgba(0,120,212,.3); outline:2px solid var(--accent); }
.at-icon { font-size:30px; display:flex; align-items:center; justify-content:center; }
.at-icon svg { width:30px; height:30px; stroke: currentColor; }
.at-name { font-size:12px; color:var(--text-sec); text-align:center; }

/* ═══════════════════════════════════════════════════════
   ANIMATIONS & UTILITIES
═══════════════════════════════════════════════════════ */
@keyframes menuPop {
  from { opacity:0; transform:scale(.95) translateY(-4px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
@keyframes winOpen {
  from { opacity:0; transform:scale(.9); }
  to   { opacity:1; transform:scale(1); }
}
@keyframes slideIn {
  from { opacity:0; transform:translateX(20px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes fadeOut {
  from { opacity:1; }
  to   { opacity:0; }
}
.win-open-anim { animation: winOpen .18s cubic-bezier(.34,1.4,.64,1); }

#battery-btn[data-tooltip]:hover::before {
  content: attr(data-tooltip);
  position: absolute; bottom: calc(100% + 8px); right: 10;
  background: var(--surface-2); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 10px; font-size: 12px; color: var(--text);
  white-space: nowrap; box-shadow: var(--shadow);
  pointer-events: none; z-index: 9999;
}

.flyout-panel {
  position: fixed; bottom: calc(var(--workspace-bottom) + 8px); right: 12px;
  z-index: 30000;
  width: 300px; background: var(--surface-2);
  backdrop-filter: blur(25px); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
  box-shadow: var(--shadow-lg); visibility: hidden;
  opacity: 0; transform: translateY(20px);
  transition: all 0.2s cubic-bezier(0.1, 0.9, 0.2, 1);
}
.flyout-panel.visible { visibility: visible; opacity: 1; transform: translateY(0); }
.qs-header { font-weight: 600; margin-bottom: 12px; }
.qs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.qs-tile { 
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 4px;
  text-align: center; cursor: pointer; transition: var(--transition);
}
.qs-tile:hover { background: var(--accent); color: white; }
.qs-tile-icon { font-size: 1.2rem; margin-bottom: 4px; }
.qs-slider-container { margin-top: 15px; padding: 0 5px; font-size: 13px; }
.qs-slider-container input { width: 100%; margin-top: 8px; accent-color: var(--accent); }

.selection-box {
  border: 1px solid var(--accent);
  background: rgba(0, 120, 212, 0.2);
  position: fixed; pointer-events: none;
  z-index: 5000;
}

/* Explorer drag & drop */
.ex-drop-target { outline: 2px dashed var(--accent) !important; background: rgba(0,120,212,.12) !important; border-radius: var(--radius); }
.sb-item.ex-drop-target { background: var(--surface-active) !important; }
.file-item.ex-dragging, .fl-item.ex-dragging { opacity: 0.45; }

/* Music / Radio app */
.app-music { display:flex; flex-direction:column; height:100%; background:var(--surface); min-height:0; }
.app-music.pill-only .music-main { display:none !important; }
.app-music.pill-only .music-pill-only { display:flex !important; }
.music-header {
  padding:12px 16px; border-bottom:1px solid var(--border); font-weight:600; font-size:15px;
  display:flex; align-items:center; justify-content:space-between; gap:12px; flex-shrink:0;
}
.music-header-actions { display:flex; gap:6px; align-items:center; }
.music-header-actions button {
  padding:6px 12px; border-radius:999px; font-size:12px; font-weight:500;
  background:var(--surface-hover); border:1px solid var(--border); color:var(--text);
  cursor:pointer; transition:background var(--transition);
}
.music-header-actions button:hover { background:var(--surface-active); }
.music-main { flex:1; display:flex; flex-direction:column; min-height:0; }
.music-list { flex:1; overflow-y:auto; padding:8px; }
.music-track {
  display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:var(--radius);
  cursor:pointer; transition:background var(--transition);
}
.music-track:hover { background:var(--surface-hover); }
.music-track.active { background:rgba(0,120,212,.2); outline:1px solid rgba(0,120,212,.35); }
.music-track .mti { flex-shrink:0; display:flex; align-items:center; }
.music-track .mti svg { width:22px; height:22px; stroke: var(--accent-light); }
.music-track .mtn { flex:1; font-size:13px; min-width:0; }
.music-bottom-bar {
  padding:12px 14px; border-top:1px solid var(--border); flex-shrink:0;
  background: linear-gradient(180deg, transparent, rgba(0,120,212,.06));
}
.music-pill-only {
  display:none; flex:1; flex-direction:column; align-items:center; justify-content:center;
  padding:20px; gap:16px; min-height:200px;
}
.music-pill-only .radio-pill { transform: scale(1.05); }
.music-hint { font-size:11px; color:var(--text-ter); margin-top:10px; text-align:center; padding:0 16px; }
.music-toolbar { display:flex; gap:8px; padding:10px 14px; border-bottom:1px solid var(--border); align-items:center; flex-shrink:0; }
.music-toolbar input { flex:1; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); font-size:13px; outline:none; }
.music-toolbar input:focus { border-color:var(--accent); }
.music-toolbar button { padding:8px 14px; border-radius:8px; background:var(--accent); color:#fff; font-size:12px; font-weight:500; border:none; cursor:pointer; }
.music-meta { font-size:11px; color:var(--text-ter); margin-top:2px; }
#wos-global-radio { position:absolute; width:0; height:0; opacity:0; pointer-events:none; }

/* Glass pill player (app + start menu) */
.radio-pill {
  display:flex; align-items:center; gap:8px; padding:8px 12px 8px 10px;
  border-radius:999px;
  background: linear-gradient(135deg, rgba(0,120,212,.22), rgba(96,205,255,.1));
  border: 1px solid rgba(0,120,212,.35);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  box-shadow: 0 4px 28px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.08);
  max-width:100%;
}

/* Reduced transparency — solid surfaces, no blur */

background: transparent !important;

@keyframes panelSlideIn { from { transform: translateX(16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* Boot experience */

<!-- ══════════════════════════════════════════════
     JAVASCRIPT — Full WebOS Engine
══════════════════════════════════════════════ -->
<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURATION & CONSTANTS
═══════════════════════════════════════════════════════════════ */
const APPS = {
  notepad:    { name:'Notepad',       icon:'file-text',      w:720,  h:520, pinned:true  },
  explorer:   { name:'File Explorer', icon:'folder-open',    w:920,  h:600, pinned:true  },
  settings:   { name:'Settings',      icon:'settings',       w:820,  h:600, pinned:true  },
  terminal:   { name:'Terminal',      icon:'terminal',       w:740,  h:500, pinned:true  },
  calculator: { name:'Calculator',    icon:'calculator',     w:320,  h:510, pinned:true  },
  browser:    { name:'Edge',          icon:'globe',          w:1000, h:680, pinned:true  },
  paint:      { name:'Paint',         icon:'palette',        w:860,  h:600, pinned:false },
  music:      { name:'Music',         icon:'music',          w:480,  h:560, pinned:true  },
  recycle:    { name:'Recycle Bin',   icon:'trash-2',        w:440,  h:460, pinned:false },
  developer:  { name:'Developer',     icon:'user-round-cog', w:1000,  h:570, pinned:true}
};

function lucideIconHtml(name, size = 18) {
  const s = typeof size === 'number' ? size + 'px' : size;
  return `<i data-lucide="${name}" class="lucide-inline" style="width:${s};height:${s}"></i>`;
}
function refreshLucideIcons(root) {
  if (typeof lucide === 'undefined' || !lucide.createIcons) return;
  const opts = { attrs: { 'stroke-width': 1.75 } };
  if (root && root.nodeType === 1) opts.root = root;
  try {
    lucide.createIcons(opts);
  } catch (e) {
    try { lucide.createIcons(); } catch (e2) {}
  }
}

const WALLPAPERS = [
  { name:'Horizon',     bg:'linear-gradient(125deg,#0c1929 0%,#1a3a52 38%,#0d2137 100%)' },
  { name:'Aurora',      bg:'linear-gradient(135deg,#0a1628 0%,#1e3a5f 45%,#0f2840 100%)' },
  { name:'Nebula',      bg:'radial-gradient(ellipse 100% 80% at 20% 20%,#4c1d95 0%,transparent 50%),radial-gradient(ellipse 80% 60% at 80% 70%,#0e7490 0%,transparent 45%),linear-gradient(160deg,#0f172a 0%,#1e1b4b 100%)' },
  { name:'Sunset',      bg:'linear-gradient(160deg,#ff6b6b 0%,#ff8e53 40%,#ffd93d 100%)' },
  { name:'Forest',      bg:'linear-gradient(135deg,#134e5e 0%,#71b280 100%)' },
  { name:'Purple',      bg:'linear-gradient(135deg,#2d1b69 0%,#8b2fc9 100%)' },
  { name:'Ocean',       bg:'linear-gradient(135deg,#005c97 0%,#363795 100%)' },
  { name:'Rose',        bg:'linear-gradient(135deg,#f953c6 0%,#b91d73 100%)' },
  { name:'Carbon',      bg:'linear-gradient(180deg,#18181b 0%,#0a0a0b 100%)' },
];

const ACCENT_COLORS = ['#0078d4','#8764b8','#567c34','#ca5010','#008b8b','#c43e1c','#69797e','#038387'];

/* ═══════════════════════════════════════════════════════════════
   VIRTUAL FILE SYSTEM
═══════════════════════════════════════════════════════════════ */
let FS = JSON.parse(localStorage.getItem('wos_fs') || 'null') || {
  '/': { type:'dir' },
  '/Desktop':  { type:'dir' },
  '/Documents':{ type:'dir' },
  '/Pictures': { type:'dir' },
  '/Downloads':{ type:'dir' },
  '/Music':    { type:'dir' },
  '/Documents/Welcome.txt': {
    type:'file', ext:'txt',
    content:'Welcome to WebOS 12!\n\nThis is your virtual file system.\nYou can create, edit, and delete files.\n\nEnjoy the experience!',
    modified: Date.now()
  },
  '/Documents/Notes.txt': {
    type:'file', ext:'txt',
    content:'My Notes\n========\n\n- Learn WebOS\n- Try all the apps\n- Customize the wallpaper',
    modified: Date.now()
  },
  '/Desktop/Readme.txt': {
    type:'file', ext:'txt',
    content:'This is a desktop file!\nDouble-click desktop icons to open apps.',
    modified: Date.now()
  },
};

function saveFS() {
  try { localStorage.setItem('wos_fs', JSON.stringify(FS)); } catch(e){}
  queueMicrotask(() => notifyFsChanged());
}

const explorerRefreshers = {};
function notifyFsChanged() {
  try {
    buildDesktopIcons();
    Object.keys(explorerRefreshers).forEach(id => {
      const fn = explorerRefreshers[id];
      if (typeof fn === 'function') { try { fn(); } catch (e) {} }
    });
  } catch (e) {}
}

function fsMovePath(srcPath, destDirPath) {
  srcPath = normPath(srcPath);
  destDirPath = normPath(destDirPath);
  const name = srcPath.split('/').filter(Boolean).pop();
  if (!name || !FS[srcPath]) return false;
  const newPath = destDirPath === '/' ? '/' + name : destDirPath + '/' + name;
  if (FS[newPath]) {
    showNotification('File Explorer', 'A file or folder with that name already exists here.', 'folder');
    return false;
  }
  const normSrc = normPath(srcPath);
  if (newPath === normSrc) return true;
  if (normSrc !== '/' && (newPath === normSrc || newPath.startsWith(normSrc + '/'))) {
    showNotification('File Explorer', 'Cannot move a folder into itself.', 'alert-triangle');
    return false;
  }
  FS[newPath] = FS[srcPath];
  delete FS[srcPath];
  const pn = normSrc + '/';
  for (const [k, v] of Object.entries(FS)) {
    if (k.startsWith(pn)) {
      const np = normPath(newPath) + '/' + k.slice(pn.length);
      FS[np] = v;
      delete FS[k];
    }
  }
  saveFS();
  return true;
}

function fsListDir(path) {
  path = normPath(path);
  const prefix = path === '/' ? '/' : path + '/';
  const items = [];
  for (const [k, v] of Object.entries(FS)) {
    if (k === path) continue;
    if (!k.startsWith(prefix)) continue;
    const rest = k.slice(prefix.length);
    if (!rest.includes('/')) items.push({ path:k, name:rest, ...v });
  }
  return items;
}

function normPath(p) {
  if (!p || p === '/') return '/';
  return p.replace(/\/+$/, '');
}

function fsParent(p) {
  p = normPath(p);
  if (p === '/') return '/';
  const parts = p.split('/');
  parts.pop();
  return parts.join('/') || '/';
}

function fsCreate(dirPath, name, type, content='') {
  const p = normPath(dirPath) + '/' + name;
  if (FS[p]) return false;
  FS[p] = type === 'dir'
    ? { type:'dir' }
    : { type:'file', ext: name.split('.').pop() || 'txt', content, modified: Date.now() };
  saveFS();
  return p;
}

function fsDelete(p) {
  const pn = normPath(p) + '/';
  for (const k of Object.keys(FS)) {
    if (k === p || k.startsWith(pn)) delete FS[k];
  }
  saveFS();
}

let RECYCLE_BIN = JSON.parse(localStorage.getItem('wos_recycle') || '[]');
function saveRecycleBin() {
  try { localStorage.setItem('wos_recycle', JSON.stringify(RECYCLE_BIN)); } catch (e) {}
}

function recyclePath(path) {
  const norm = normPath(path);
  if (!FS[norm]) return false;
  const keys = [norm];
  const pn = norm + '/';
  for (const k of Object.keys(FS)) {
    if (k.startsWith(pn)) keys.push(k);
  }
  const snapshot = {};
  keys.forEach(k => { snapshot[k] = JSON.parse(JSON.stringify(FS[k])); });
  const id = 'rb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
  RECYCLE_BIN.push({
    id,
    root: norm,
    name: norm.split('/').filter(Boolean).pop() || norm,
    deleted: Date.now(),
    snapshot
  });
  fsDelete(norm);
  saveRecycleBin();
  return true;
}

function restoreRecycleEntry(entry) {
  const paths = Object.keys(entry.snapshot).sort((a, b) => a.split('/').length - b.split('/').length);
  for (const p of paths) {
    if (FS[p]) {
      showNotification('Recycle Bin', 'Cannot restore: ' + p.split('/').pop() + ' already exists.', 'alert-circle');
      return false;
    }
  }
  paths.forEach(p => { FS[p] = JSON.parse(JSON.stringify(entry.snapshot[p])); });
  RECYCLE_BIN = RECYCLE_BIN.filter(x => x.id !== entry.id);
  saveRecycleBin();
  saveFS();
  return true;
}

function purgeRecycleEntry(id) {
  RECYCLE_BIN = RECYCLE_BIN.filter(x => x.id !== id);
  saveRecycleBin();
}

function emptyRecycleBinPermanently() {
  RECYCLE_BIN = [];
  saveRecycleBin();
}

function fsRename(p, newName) {
  const parent = fsParent(p);
  const newPath = normPath(parent) + '/' + newName;
  const old = FS[p];
  if (!old) return;
  FS[newPath] = old;
  delete FS[p];
  // rename children
  const pn = normPath(p) + '/';
  for (const [k, v] of Object.entries(FS)) {
    if (k.startsWith(pn)) {
      const np = normPath(newPath) + '/' + k.slice(pn.length);
      FS[np] = v;
      delete FS[k];
    }
  }
  saveFS();
}

function fsWrite(p, content) {
  if (FS[p]) { FS[p].content = content; FS[p].modified = Date.now(); saveFS(); }
}

function fileTypeLucide(name, type) {
  if (type === 'dir') return 'folder';
  const ext = (name.split('.').pop() || '').toLowerCase();
  const map = {
    txt: 'file-text', md: 'file-text', js: 'file-code', html: 'file-code', css: 'palette',
    json: 'braces', png: 'image', jpg: 'image', gif: 'image', mp3: 'music', mp4: 'video',
    zip: 'archive', pdf: 'file-text', exe: 'cpu'
  };
  return map[ext] || 'file';
}

/* ═══════════════════════════════════════════════════════════════
   SETTINGS STATE
═══════════════════════════════════════════════════════════════ */
let state = JSON.parse(localStorage.getItem('wos_state') || '{}');
state.theme = state.theme || 'dark';
state.wallpaper = state.wallpaper ?? 0;
state.accent = state.accent || '#0078d4';
if (!state.iconLayout || typeof state.iconLayout !== 'object') state.iconLayout = {};
state.brightness = Math.round(Math.max(10, Math.min(100, Number(state.brightness) || 100)));
state.notificationsEnabled = state.notificationsEnabled !== false;
state.transparencyEnabled = state.transparencyEnabled !== false;
state.username = (state.username && String(state.username).trim()) || 'User';
if (!Array.isArray(state.pinnedApps)) {
  state.pinnedApps = Object.keys(APPS).filter(id => APPS[id].pinned);
}

function saveState() { localStorage.setItem('wos_state', JSON.stringify(state)); }

function escapeHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
}

function applyBrightness(pct) {
  const v = Math.round(Math.max(10, Math.min(100, Number(pct) || 100)));
  state.brightness = v;
  document.body.style.filter = `brightness(${v}%)`;
  saveState();
  document.querySelectorAll('input[data-brightness-slider]').forEach(el => { el.value = String(v); });
}

function applyTransparency() {
  document.documentElement.classList.toggle('reduce-transparency', state.transparencyEnabled === false);
}

function updateUsernameUI() {
  const el = document.getElementById('start-username');
  if (el) el.textContent = state.username;
}

function launchOrFocusApp(appId) {
  const wins = [...windowsMap.entries()].filter(([, w]) => w.appId === appId);
  const openNorm = wins.find(([, w]) => w.state !== 'minimized');
  if (openNorm) { focusWin(openNorm[0]); return; }
  const min = wins.find(([, w]) => w.state === 'minimized');
  if (min) { restoreWin(min[0]); return; }
  launchApp(appId);
}

function togglePinToTaskbar(appId) {
  const p = [...(state.pinnedApps || [])];
  const i = p.indexOf(appId);
  if (i >= 0) p.splice(i, 1);
  else if (p.length < 16) p.push(appId);
  state.pinnedApps = p;
  saveState();
  updateTaskbar();
}

function youtubeIdFromUrl(raw) {
  let u = String(raw || '').trim();
  if (!u) return null;
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
  try {
    const url = new URL(u);
    const h = url.hostname.replace(/^www\./, '');
    if (h === 'youtu.be') {
      const id = url.pathname.replace(/^\//, '').split('/')[0];
      return id && id.length >= 6 ? id : null;
    }
    if (h === 'youtube.com' || h === 'm.youtube.com' || h === 'www.youtube.com' || h.endsWith('.youtube.com')) {
      if (url.pathname.startsWith('/watch')) return url.searchParams.get('v');
      if (url.pathname.startsWith('/embed/')) return url.pathname.split('/')[2];
      if (url.pathname.startsWith('/shorts/')) return url.pathname.split('/')[2];
      if (url.pathname.startsWith('/live/')) return url.pathname.split('/')[2];
    }
  } catch (e) {}
  return null;
}

function applyTheme(t) {
  state.theme = t;
  document.documentElement.setAttribute('data-theme', t);
  saveState();
}

function applyWallpaper(idx) {
  const i = Math.max(0, Math.min(Number(idx) || 0, WALLPAPERS.length - 1));
  state.wallpaper = i;
  document.getElementById('desktop').style.backgroundImage = '';
  document.getElementById('desktop').style.background = WALLPAPERS[i].bg;
  saveState();
}

function applyAccent(color) {
  state.accent = color;
  document.documentElement.style.setProperty('--accent', color);
  document.documentElement.style.setProperty('--accent-hover', color);
  saveState();
}

/* ═══════════════════════════════════════════════════════════════
   WINDOW MANAGER
═══════════════════════════════════════════════════════════════ */
const winsLayer = document.getElementById('windows-layer');
let windowsMap  = new Map();  // id → { el, appId, state:'normal'|'minimized'|'maximized', prevBounds }
let focusedWin  = null;
let zTop        = 100;
let winCount    = 0;

function createWindow(appId, extra = {}) {
  const app = APPS[appId];
  if (!app) return;

  const id  = `win_${++winCount}`;
  const vw  = winsLayer.offsetWidth  || window.innerWidth;
  const vh  = winsLayer.offsetHeight || (window.innerHeight - 48);
  const w   = Math.min(app.w, vw - 40);
  const h   = Math.min(app.h, vh - 40);
  const x   = Math.round((vw - w) / 2) + (winCount % 5) * 24;
  const y   = Math.round((vh - h) / 2) + (winCount % 5) * 20;

  const el = document.createElement('div');
  el.className = 'window win-open-anim';
  el.id = id;
  el.style.cssText = `width:${w}px;height:${h}px;left:${x}px;top:${y}px;z-index:${++zTop}`;

  // Build title bar
  el.innerHTML = `
    <div class="win-titlebar" id="${id}_tb">
      <span class="win-icon">${lucideIconHtml(app.icon, 15)}</span>
      <span class="win-title">${extra.title || app.name}</span>
      <div class="win-ctrls">
        <div class="wc-btn wc-min"  title="Minimize" data-id="${id}">
          <svg viewBox="0 0 10 1"><rect width="10" height="1"/></svg>
        </div>
        <div class="wc-btn wc-max"  title="Maximize" data-id="${id}">
          <svg viewBox="0 0 10 10"><rect width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        </div>
        <div class="wc-btn wc-close" title="Close" data-id="${id}">
          <svg viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.4"/>
          <line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.4"/></svg>
        </div>
      </div>
    </div>
    <div class="win-content" id="${id}_content"></div>
    <!-- Resize handles -->
    <div class="rh rh-n"  data-id="${id}" data-dir="n"></div>
    <div class="rh rh-s"  data-id="${id}" data-dir="s"></div>
    <div class="rh rh-e"  data-id="${id}" data-dir="e"></div>
    <div class="rh rh-w"  data-id="${id}" data-dir="w"></div>
    <div class="rh rh-ne" data-id="${id}" data-dir="ne"></div>
    <div class="rh rh-nw" data-id="${id}" data-dir="nw"></div>
    <div class="rh rh-se" data-id="${id}" data-dir="se"></div>
    <div class="rh rh-sw" data-id="${id}" data-dir="sw"></div>
  `;

  winsLayer.appendChild(el);
  refreshLucideIcons(el);

  const winData = { el, appId, title: extra.title || app.name, state:'normal', prevBounds:null };
  windowsMap.set(id, winData);

  // Render app content
  const content = document.getElementById(`${id}_content`);
  renderApp(appId, content, id, extra);

  // Wire controls
  el.querySelector('.wc-min').addEventListener('click',  () => minimizeWin(id));
  el.querySelector('.wc-max').addEventListener('click',  () => toggleMaximize(id));
  el.querySelector('.wc-close').addEventListener('click',() => closeWin(id));

  // Focus on click
  el.addEventListener('mousedown', () => focusWin(id), true);

  // Drag
  initDrag(el.querySelector('.win-titlebar'), el, id);
  

  // Resize
  el.querySelectorAll('.rh').forEach(h => initResize(h, el, id));

  focusWin(id);
  updateTaskbar();
  return id;
}

function focusWin(id) {
  if (focusedWin === id) return;
  if (focusedWin) {
    const prev = windowsMap.get(focusedWin);
    if (prev) prev.el.classList.remove('focused');
  }
  focusedWin = id;
  const win = windowsMap.get(id);
  if (!win) return;
  win.el.classList.add('focused');
  win.el.style.zIndex = ++zTop;
  updateTaskbar();
}

function minimizeWin(id) {
  const win = windowsMap.get(id);
  if (!win) return;
  win.state = 'minimized';
  win.el.classList.add('minimized');
  if (focusedWin === id) { focusedWin = null; }
  updateTaskbar();
}

function restoreWin(id) {
  const win = windowsMap.get(id);
  if (!win) return;
  win.state = 'normal';
  win.el.classList.remove('minimized','maximized','snapped-left','snapped-right');
  if (win.prevBounds) {
    const b = win.prevBounds;
    win.el.style.cssText = `width:${b.w}px;height:${b.h}px;left:${b.x}px;top:${b.y}px;z-index:${win.el.style.zIndex}`;
    win.prevBounds = null;
  }
  focusWin(id);
  updateTaskbar();
}

function toggleMaximize(id) {
  const win = windowsMap.get(id);
  if (!win) return;
  if (win.state === 'maximized') {
    restoreWin(id);
  } else {
    const el = win.el;
    win.prevBounds = { x:el.offsetLeft, y:el.offsetTop, w:el.offsetWidth, h:el.offsetHeight };
    win.state = 'maximized';
    el.classList.remove('minimized','snapped-left','snapped-right');
    el.classList.add('maximized');
    focusWin(id);
    updateTaskbar();
  }
}

function closeWin(id) {
  const win = windowsMap.get(id);
  if (!win) return;
  delete explorerRefreshers[id];
  win.el.style.animation = 'fadeOut .12s ease forwards';
  setTimeout(() => {
    win.el.remove();
    windowsMap.delete(id);
    if (focusedWin === id) focusedWin = null;
    updateTaskbar();
  }, 120);
}

function taskbarClickWin(id) {
  const win = windowsMap.get(id);
  if (!win) return;
  if (win.state === 'minimized') {
    restoreWin(id);
  } else if (focusedWin === id) {
    minimizeWin(id);
  } else {
    focusWin(id);
  }
}

/* ── Drag ── */
function initDrag(handle, winEl, id) {
  let startX, startY, startL, startT, dragging = false;
  const snap = document.getElementById('snap-overlay');

  handle.addEventListener('mousedown', e => {
    if (e.target.closest('.wc-btn')) return;
    const win = windowsMap.get(id);
    if (!win || win.state === 'maximized') {
      // Un-maximize on drag from max
      if (win && win.state === 'maximized') {
        const rect = winEl.getBoundingClientRect();
        const newW = win.prevBounds?.w || winEl.offsetWidth;
        const newH = win.prevBounds?.h || winEl.offsetHeight;
        win.state = 'normal';
        winEl.classList.remove('maximized');
        winEl.style.width  = newW + 'px';
        winEl.style.height = newH + 'px';
        winEl.style.left   = (e.clientX - newW/2) + 'px';
        winEl.style.top    = '0px';
        win.prevBounds = null;
      } else return;
    }
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startL = winEl.offsetLeft; startT = winEl.offsetTop;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const win = windowsMap.get(id);
    if (!win) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    let nx = startL + dx, ny = startT + dy;

    // Constrain to viewport
    const vw = winsLayer.offsetWidth;
    const vh = winsLayer.offsetHeight;
    nx = Math.max(-winEl.offsetWidth + 40, Math.min(vw - 40, nx));
    ny = Math.max(0, Math.min(vh - 36, ny));

    winEl.style.left = nx + 'px';
    winEl.style.top  = ny + 'px';

    // Snap zones
    if (e.clientX < 4) {
      snap.style.cssText = 'display:block;left:0;top:0;width:50%;height:100%;';
    } else if (e.clientX > window.innerWidth - 4) {
      snap.style.cssText = 'display:block;left:50%;top:0;width:50%;height:100%;';
    } else if (e.clientY < 4) {
      snap.style.cssText = 'display:block;left:0;top:0;width:100%;height:100%;';
    } else {
      snap.style.display = 'none';
    }
  });

  document.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false;
    snap.style.display = 'none';

    const win = windowsMap.get(id);
    if (!win) return;

    // Apply snap
    const vw = winsLayer.offsetWidth;
    const vh = winsLayer.offsetHeight;
    if (e.clientX < 4) {
      win.prevBounds = { x:winEl.offsetLeft, y:winEl.offsetTop, w:winEl.offsetWidth, h:winEl.offsetHeight };
      winEl.classList.add('snapped-left');
      win.state = 'snapped';
    } else if (e.clientX > window.innerWidth - 4) {
      win.prevBounds = { x:winEl.offsetLeft, y:winEl.offsetTop, w:winEl.offsetWidth, h:winEl.offsetHeight };
      winEl.classList.add('snapped-right');
      win.state = 'snapped';
    } else if (e.clientY < 4) {
      win.prevBounds = { x:winEl.offsetLeft, y:winEl.offsetTop, w:winEl.offsetWidth, h:winEl.offsetHeight };
      toggleMaximize(id);
    }
  });

  // Double-click title bar → toggle maximize
  handle.addEventListener('dblclick', e => {
    if (e.target.closest('.wc-btn')) return;
    toggleMaximize(id);
  });
}

/* ── Resize ── */
function initResize(handle, winEl, id) {
  let startX, startY, startL, startT, startW, startH, dir;

  handle.addEventListener('mousedown', e => {
    const win = windowsMap.get(id);
    if (!win || win.state !== 'normal') return;
    dir = handle.dataset.dir;
    startX = e.clientX; startY = e.clientY;
    startL = winEl.offsetLeft; startT = winEl.offsetTop;
    startW = winEl.offsetWidth; startH = winEl.offsetHeight;
    e.preventDefault(); e.stopPropagation();
    document.body.style.cursor = handle.style.cursor;
  });

  document.addEventListener('mousemove', e => {
    if (!dir || !startX) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    const min = 280, minH = 180;
    let nl = startL, nt = startT, nw = startW, nh = startH;

    if (dir.includes('e')) nw = Math.max(min, startW + dx);
    if (dir.includes('s')) nh = Math.max(minH, startH + dy);
    if (dir.includes('w')) { nw = Math.max(min, startW - dx); nl = startL + (startW - nw); }
    if (dir.includes('n')) { nh = Math.max(minH, startH - dy); nt = startT + (startH - nh); }

    winEl.style.left = nl + 'px'; winEl.style.top = nt + 'px';
    winEl.style.width = nw + 'px'; winEl.style.height = nh + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (dir) { dir = null; startX = null; document.body.style.cursor = ''; }
  });
}

/* ═══════════════════════════════════════════════════════════════
   TASKBAR
═══════════════════════════════════════════════════════════════ */
function updateTaskbar() {
  const pinnedEl = document.getElementById('taskbar-pinned');
  const winsEl = document.getElementById('taskbar-windows');
  const sep = document.getElementById('taskbar-pin-sep');
  if (!pinnedEl || !winsEl) return;
  pinnedEl.innerHTML = '';
  winsEl.innerHTML = '';

  const pins = state.pinnedApps || [];
  pins.forEach(appId => {
    const app = APPS[appId];
    if (!app) return;
    const btn = document.createElement('div');
    const hasOpen = [...windowsMap.values()].some(w => w.appId === appId && w.state !== 'minimized');
    const hasMin = [...windowsMap.values()].some(w => w.appId === appId && w.state === 'minimized');
    const focusThis = [...windowsMap.entries()].some(([wid, w]) => w.appId === appId && focusedWin === wid && w.state !== 'minimized');
    btn.className = 'tb-btn tb-pinned' + (hasOpen || hasMin ? ' app-open' : '') + (focusThis ? ' app-focused' : '');
    btn.innerHTML = lucideIconHtml(app.icon, 20);
    btn.title = app.name;
    btn.dataset.tooltip = app.name;
    btn.onclick = () => launchOrFocusApp(appId);
    btn.addEventListener('contextmenu', e => {
      e.preventDefault();
      showContextMenu(e.clientX, e.clientY, [
        { lucide: 'pin', label: 'Unpin from taskbar', action: () => togglePinToTaskbar(appId) },
        { sep: true },
        { lucide: 'app-window', label: 'Open new window', action: () => launchApp(appId) },
      ]);
    });
    pinnedEl.appendChild(btn);
  });

  for (const [id, win] of windowsMap) {
    const app = APPS[win.appId];
    const btn = document.createElement('div');
    btn.className = 'tb-btn' +
      (win.state !== 'minimized' ? ' app-open' : ' app-open') +
      (focusedWin === id && win.state !== 'minimized' ? ' app-focused' : '');
    btn.innerHTML = lucideIconHtml(app.icon, 20);
    btn.title = win.title || app.name;
    btn.dataset.tooltip = win.title || app.name;
    btn.onclick = () => taskbarClickWin(id);

    btn.addEventListener('contextmenu', e => {
      e.preventDefault();
      showContextMenu(e.clientX, e.clientY, [
        { lucide:'panel-top', label:'Restore',  action: () => restoreWin(id) },
        { lucide:'minus', label:'Minimize', action: () => minimizeWin(id) },
        { lucide:'maximize-2', label:'Maximize', action: () => toggleMaximize(id) },
        { sep: true },
        { lucide:'x',  label:'Close window', action: () => closeWin(id), cls:'danger' },
      ]);
    });
    winsEl.appendChild(btn);
  }

  if (sep) sep.style.display = pins.length && windowsMap.size ? 'block' : 'none';
  refreshLucideIcons(pinnedEl);
  refreshLucideIcons(winsEl);
}

let startOpen = false;

function resetStartMenuAllAppsView() {

function toggleStart() {

function buildStartGrid() {

function buildStartRec() {

/* Start menu search */
const SEARCH_SETTINGS_HINTS = [
  { keys: ['wallpaper', 'background', 'personal', 'accent', 'theme', 'dark', 'light', 'color'], label: 'Settings — Personalization', lucide: 'palette', action: () => { launchApp('settings'); toggleStart(); } },
  { keys: ['system', 'about', 'info', 'display'], label: 'Settings', lucide: 'settings', action: () => { launchApp('settings'); toggleStart(); } },
  { keys: ['wifi', 'network', 'volume', 'brightness', 'quick'], label: 'Quick Settings', lucide: 'sliders-horizontal', action: () => { toggleStart(); toggleQuickSettings(); } },
];

function collectMatchingFiles(q) {
  const ql = q.toLowerCase();
  const out = [];
  for (const [path, meta] of Object.entries(FS)) {
    if (meta.type !== 'file') continue;
    const name = path.split('/').pop();
    if (name.toLowerCase().includes(ql) || path.toLowerCase().includes(ql)) out.push({ path, name });
  }
  return out.slice(0, 24);
}

function performStartSearch() {
  const input = document.getElementById('start-search-input');
  const q = input.value.trim().toLowerCase();
  const body = document.getElementById('start-body');
  const results = document.getElementById('start-search-results');
  if (!q) {
    body.style.display = 'block';
    results.style.display = 'none';
    resetStartMenuAllAppsView();
    syncRadioPillChrome();
    return;
  }
  body.style.display = 'none';
  results.style.display = 'block';
  const pillWrapSearch = document.getElementById('start-radio-pill-wrap');
  if (pillWrapSearch) pillWrapSearch.hidden = true;
  results.innerHTML = '';

  for (const [id, app] of Object.entries(APPS)) {
    if (app.name.toLowerCase().includes(q)) {
      const item = document.createElement('div');
      item.className = 'sr-item';
      item.innerHTML = `<div class="sri">${lucideIconHtml(app.icon, 26)}</div><div class="sr-meta"><div class="srn">${app.name}</div><div class="sr-sub">Application</div></div>`;
      item.onclick = () => { launchApp(id); toggleStart(); };
      results.appendChild(item);
    }
  }

  for (const hint of SEARCH_SETTINGS_HINTS) {
    if (hint.keys.some(k => k.includes(q) || q.includes(k))) {
      const item = document.createElement('div');
      item.className = 'sr-item';
      item.innerHTML = `<div class="sri">${lucideIconHtml(hint.lucide, 26)}</div><div class="sr-meta"><div class="srn">${hint.label}</div><div class="sr-sub">Suggested</div></div>`;
      item.onclick = () => hint.action();
      results.appendChild(item);
    }
  }

  collectMatchingFiles(q).forEach(f => {
    const item = document.createElement('div');
    item.className = 'sr-item';
    item.innerHTML = `<div class="sri">${lucideIconHtml(fileTypeLucide(f.name, 'file'), 26)}</div><div class="sr-meta"><div class="srn">${f.name}</div><div class="sr-sub">${f.path}</div></div>`;
    item.onclick = () => {
      toggleStart();
      const ext = (f.name.split('.').pop() || '').toLowerCase();
      if (['mp3', 'wav', 'ogg', 'm4a'].includes(ext)) launchApp('music');
      else openFileInNotepad(f.path);
    };
    results.appendChild(item);
  });

  if (!results.children.length) {
    results.innerHTML = '<div style="padding:20px 24px;color:var(--text-sec);font-size:13px;">No results. Try an app name, a file name, or words like “wallpaper” or “theme”.</div>';
  }
  refreshLucideIcons(results);
}

document.getElementById('start-search-input').addEventListener('input', performStartSearch);
document.getElementById('start-search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const first = document.querySelector('#start-search-results .sr-item');
    if (first) { e.preventDefault(); first.click(); }
  }
});

document.getElementById('pow-restart').addEventListener('click', () => {
  toggleStart();
  showNotification('WebOS 12', 'Restarting...', 'rotate-cw');
  setTimeout(() => location.reload(), 3000);
});

document.getElementById('pow-sleep').addEventListener('click', () => {
  toggleStart();
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99999;cursor:pointer;';
  el.onclick = () => el.remove();
  document.body.appendChild(el);
  showNotification('Sleep', 'Click the screen to wake up', 'moon');
});

/* ═══════════════════════════════════════════════════════════════
   APP LAUNCHER
═══════════════════════════════════════════════════════════════ */
function launchApp(appId, extra = {}) {
  const id = createWindow(appId, extra);
  return id;
}

function openFileInNotepad(filePath) {
  const f = FS[filePath];
  if (!f || f.type !== 'file') return;
  const id = launchApp('notepad', { title: filePath.split('/').pop(), filePath });
  return id;
}

/* ═══════════════════════════════════════════════════════════════
   APP RENDERERS
═══════════════════════════════════════════════════════════════ */
function renderApp(appId, container, winId, extra) {
  switch(appId) {
    case 'notepad':    renderNotepad(container, winId, extra); break;
    case 'explorer':   renderExplorer(container, winId, extra); break;
    case 'settings':   renderSettings(container, winId, extra); break;
    case 'terminal':   renderTerminal(container, winId, extra); break;
    case 'calculator': renderCalculator(container, winId); break;
    case 'browser':    renderBrowser(container, winId, extra); break;
    case 'paint':      renderPaint(container, winId); break;
    case 'music':      renderMusic(container, winId); break;
    case 'recycle':    renderRecycle(container, winId); break;
    case 'developer':
  container.innerHTML = renderDevApp(); 
  break;
  }
}
